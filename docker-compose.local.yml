services:
  cortex-pg:
    image: pgvector/pgvector:pg16
    container_name: cortex-local-pg
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: cortex
      POSTGRES_PASSWORD: cortex
      POSTGRES_DB: cortex
    volumes:
      - cortex_pgdata:/var/lib/postgresql/data
      - ./scripts/local-db-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cortex -d cortex"]
      interval: 2s
      timeout: 2s
      retries: 30

volumes:
  cortex_pgdata:
